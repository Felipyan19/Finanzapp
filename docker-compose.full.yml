version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: finanzapp-full-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finanzapp
    ports:
      - "8367:5432"
    volumes:
      - finanzapp_full_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finanzapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finanzapp-full-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finanzapp-full-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: finanzapp
      DB_USER: postgres
      DB_PASSWORD: postgres
      API_HOST: 0.0.0.0
      API_PORT: 5050
      DEBUG: "False"
      CORS_ORIGINS: "*"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "5050"]
    ports:
      - "4000:5050"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finanzapp-full-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: finanzapp-full-frontend
    ports:
      - "4001:80"
    depends_on:
      - api
    networks:
      - finanzapp-full-network

volumes:
  finanzapp_full_postgres_data:

networks:
  finanzapp-full-network:
    driver: bridge
