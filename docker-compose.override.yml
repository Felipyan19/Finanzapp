version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: finanzapp-dev-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-finanzapp}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-finanzapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finanzapp-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: finanzapp-api:latest
    container_name: finanzapp-api-dev
    ports:
      - "${API_PORT:-5050}:5050"
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-finanzapp}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-5050}
      DEBUG: ${DEBUG:-True}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - finanzapp-network
    command: >
      bash -c "pip install --no-cache-dir -e . &&
      uvicorn app.main:app --host 0.0.0.0 --port 5050 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app
        - action: rebuild
          path: requirements.txt

volumes:
  postgres_data:

networks:
  finanzapp-network:
    driver: bridge
